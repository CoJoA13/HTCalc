name: Feature request
description: Propose a model, UI, report, or repository improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ADI
        - Steel austempering
        - Martempering
        - Project save/load
        - Reports/export
        - UI/workflow
        - Documentation/repository setup
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or engineering-review problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed outcome
      description: Describe the desired behavior or documentation.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation expectations
      description: For model work, describe expected tests, references, or trial data needed.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Note any simpler or safer alternatives.
